name: Release to PyPI

# Publishes every PixelRAG package to PyPI via Trusted Publishing (OIDC — no API
# tokens). Triggered by publishing a GitHub Release (tag like `v0.1.0`), or run
# manually with dry_run to build without uploading.
#
# One-time setup on PyPI (per package — pixelrag, pixelrag-render, pixelrag-embed,
# pixelrag-index, pixelrag-serve): add a "pending publisher" pointing at
#   owner: StarTrail-org   repo: PixelRAG   workflow: release.yml   environment: pypi
# See RELEASING.md.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only, do not publish"
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Trusted Publishing (OIDC)
    strategy:
      fail-fast: false
      matrix:
        package:
          - pixelrag
          - pixelrag-render
          - pixelrag-embed
          - pixelrag-index
          - pixelrag-serve
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Build ${{ matrix.package }}
        run: uv build --package ${{ matrix.package }} --out-dir dist

      - name: List artifacts
        run: ls -l dist

      - name: Publish ${{ matrix.package }} to PyPI
        if: ${{ github.event_name == 'release' || !inputs.dry_run }}
        run: uv publish --trusted-publishing always
